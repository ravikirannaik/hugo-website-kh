
<div class="copyright">
  <span class="power-by">
    {{ (printf (T "powered") `<a class="hexo-link" href="https://gohugo.io">Hugo.</a>`) | safeHTML }}
    {{- $current := now.Format "2006" }}
    &copy; 
    {{ if ne .Site.Params.since $current -}}
      {{ .Site.Params.since }} - 
    {{ end }}
    {{- $current }}
    <span class="author">{{if .Site.Copyright }}{{ .Site.Copyright | safeHTML }}{{ else }}{{ .Site.Params.author.name | safeHTML }}{{ end }}</span>
  </span>
</div>
